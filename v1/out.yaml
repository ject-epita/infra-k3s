    namespace: media
    labels:
      chart: app-template
      name: qbittorrent
      namespace: media
    values:
      - controllers:
          qbittorrent:
            containers:
              app:
                dependsOn: gluetun
                env:
                  PGID: "1000"
                  PUID: "1000"
                  TZ: Europe/Paris
                  WEBUI_PORT: "8080"
                image:
                  repository: ghcr.io/linuxserver/qbittorrent
                  tag: 5.1.4-r2
                resources:
                  limits:
                    cpu: 1000m
                    memory: 1Gi
                  requests:
                    cpu: 100m
                    memory: 256Mi
              gluetun:
                env:
                  DOT: "off"
                  FIREWALL_INPUT_PORTS: "8080"
                  FIREWALL_OUTBOUND_SUBNETS: 10.42.0.0/16,10.43.0.0/16,fd00:42::/56,fd00:43::/108
                  HEALTH_VPN_DURATION_INITIAL: 30s
                  SERVER_COUNTRIES: France
                  UPDATER_PERIOD: 24h
                  VPN_PORT_FORWARDING: "off"
                  VPN_SERVICE_PROVIDER: protonvpn
                  VPN_TYPE: wireguard
                  WIREGUARD_PRIVATE_KEY: 2G60ImRIoyNyyqkR41m/tqTkbQ2MqZ0PCMPMWwt0lGo=
                image:
                  repository: ghcr.io/qdm12/gluetun
                  tag: v3.41.1
                resources:
                  limits:
                    cpu: 200m
                    memory: 256Mi
                  requests:
                    cpu: 50m
                    memory: 64Mi
                securityContext:
                  capabilities:
                    add:
                      - NET_ADMIN
                  runAsUser: 0
        ingress:
          app:
            annotations:
              traefik.ingress.kubernetes.io/router.middlewares: kube-system-authentik-forwardauth@kubernetescrd
              traefik.ingress.kubernetes.io/router.tls: "true"
              traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
            className: traefik
            enabled: true
            hosts:
              - host: qbittorrent.kube.thivillon.org
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: app
                      port: http
        persistence:
          config:
            accessMode: ReadWriteOnce
            advancedMounts:
              qbittorrent:
                app:
                  - path: /config
            size: 1Gi
            storageClass: local-config
            type: persistentVolumeClaim
          data:
            advancedMounts:
              qbittorrent:
                app:
                  - path: /data
            existingClaim: media-data-pvc
            type: persistentVolumeClaim
        service:
          app:
            controller: qbittorrent
            ports:
              http:
                port: 8080
