---
services:
  garage:
    image: dxflrs/garage:v2.3.0 # Target a stable version
    container_name: garage
    restart: unless-stopped
    # Depending on Synology setup, host network is often easier to expose the 3900 port to the NUC
    # but bridge with port mapping might be cleaner. Let's use port mapping.
    expose:
      - "3900" # S3 API
      - "3903" # Admin API
    ports:
      - "100.114.35.5:3900:3900" # S3 API
      - "[fd7a:115c:a1e0::b101:2306]:3900:3900" # IPv6 access
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - ./data:/var/lib/garage
    command: [ "/garage", "server" ]

  webui:
    image: khairul169/garage-webui:latest
    container_name: garage-webui
    restart: unless-stopped
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
    ports:
      - 100.114.35.5:3909:3909
      - "[fd7a:115c:a1e0::b101:2306]:3909:3909" # IPv6 access
    environment:
      API_BASE_URL: "http://garage:3903"
      S3_ENDPOINT_URL: "http://garage:3900"
