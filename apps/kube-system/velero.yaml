apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://vmware-tanzu.github.io/helm-charts'
    chart: velero
    targetRevision: 12.0.1
    helm:
      values: |
        features: EnableHostPath
        snapshotsEnabled: false
        upgradeCRDs: true
        credentials:
          useSecret: true
          existingSecret: velero-s3-credentials
        configuration:
          extraArgs:
            - --features=EnableHostPath
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: "velero-backups"
              config:
                region: auto
                s3ForcePathStyle: true
                s3Url: "https://55284c6b3c405233105a9c4ce7d19370.eu.r2.cloudflarestorage.com"
          uploaderType: kopia
          defaultVolumesToFsBackup: false
        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.11.1
            imagePullPolicy: IfNotPresent
            volumeMounts:
              - mountPath: /target
                name: plugins
        deployNodeAgent: true
        nodeAgent:
          extraArgs:
            - --features=EnableHostPath
            - server
        schedules:
          daily-backup:
            disabled: false
            schedule: "0 2 * * *"
            template:
              ttl: "720h"
              storageLocation: default
              excludedNamespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - argocd
                - cert-manager
                - traefik
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
