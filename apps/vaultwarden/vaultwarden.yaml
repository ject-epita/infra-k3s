apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaultwarden
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://bjw-s-labs.github.io/helm-charts'
    chart: app-template
    targetRevision: 4.6.2
    helm:
      values: |
        controllers:
          vaultwarden:
            strategy: Recreate
            pod:
              annotations:
                backup.velero.io/backup-volumes: data
            containers:
              app:
                image:
                  repository: ghcr.io/dani-garcia/vaultwarden
                  # renovate: datasource=docker depName=ghcr.io/dani-garcia/vaultwarden
                  tag: "1.35.8"
                env:
                  - name: DOMAIN
                    value: "https://vault-test.ject.fr"
                  - name: SIGNUPS_ALLOWED
                    value: "true"
                  - name: DB_HOST
                    value: "vaultwarden-db-rw"
                  - name: DB_NAME
                    value: "vaultwarden"
                  - name: DB_USER
                    valueFrom:
                      secretKeyRef:
                        name: vaultwarden-db-app
                        key: username
                  - name: DB_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: vaultwarden-db-app
                        key: password
                  - name: DATABASE_URL
                    value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):5432/$(DB_NAME)"
                  - name: PUSH_ENABLED
                    value: "true"
                  - name: PUSH_RELAY_URI
                    value: "https://api.bitwarden.eu"
                  - name: PUSH_IDENTITY_URI
                    value: "https://identity.bitwarden.eu"
                  - name: SIGNUPS_DOMAINS_WHITELIST
                    value: "ject.fr"
                  - name: INVITATION_ORG_NAME
                    value: "JECT Vault"
                  - name: EMAIL_CHANGE_ALLOWED
                    value: "false"
                  - name: SMTP_HOST
                    value: "smtp.gmail.com"
                  - name: SMTP_FROM_NAME
                    value: "JECT Vault"
                  - name: SMTP_SECURITY
                    value: "starttls"
                  - name: SMTP_PORT
                    value: "587"
                envFrom:
                  - secretRef:
                      name: vaultwarden-secret
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 200m
                    memory: 256Mi

        service:
          app:
            controller: vaultwarden
            ports:
              http:
                port: 80

        persistence:
          data:
            type: persistentVolumeClaim
            storageClass: local-config
            accessMode: ReadWriteOnce
            size: 1Gi
            globalMounts:
              - path: /data

        ingress:
          app:
            enabled: true
            className: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.tls: "true"
              traefik.ingress.kubernetes.io/router.tls.certresolver: "letsencrypt"
            hosts:
              - host: "vault-test.ject.fr"
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: app
                      port: http

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: vaultwarden
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
  ignoreDifferences:
  - kind: PersistentVolumeClaim
    jsonPointers:
    - /spec/volumeName
