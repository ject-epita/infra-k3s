controllers:
  radarr:
    containers:
      app:
        image:
          repository: ghcr.io/linuxserver/radarr
          tag: "6.0.4.10291"
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: Europe/Paris
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

service:
  app:
    controller: radarr
    ports:
      http:
        port: 7878

persistence:
  config:
    type: persistentVolumeClaim
    storageClass: local-config
    accessMode: ReadWriteOnce
    size: 2Gi
    globalMounts:
      - path: /config
  # Single shared NFS PVC — same filesystem as downloads enables hardlinks
  data:
    type: persistentVolumeClaim
    existingClaim: media-data-pvc
    globalMounts:
      - path: /data

ingress:
  app:
    enabled: false
