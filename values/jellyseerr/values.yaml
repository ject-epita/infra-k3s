# DEPRECATED: This values file is no longer used. The release was renamed from
# "jellyseerr" to "seerr". Use values/seerr/values.yaml instead.
# The project itself was also renamed and moved to https://github.com/seerr-team/seerr

controllers:
  seerr:
    containers:
      app:
        image:
          repository: ghcr.io/seerr-team/seerr
          tag: "3.1.0"
        env:
          LOG_LEVEL: info
          TZ: Europe/Paris
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

service:
  app:
    controller: seerr
    ports:
      http:
        port: 5055

persistence:
  config:
    type: persistentVolumeClaim
    storageClass: local-config
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /app/config

ingress:
  app:
    enabled: false
