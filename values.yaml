# Feature toggles — set enabled: false to disable a service without removing its config.
# Infrastructure releases are always deployed and not toggleable.

features:
  # --- Auth ---
  authentik:
    app:
      enabled: false
    db:
      enabled: false

  # --- Photos ---
  immich:
    app:
      enabled: false
    db:
      enabled: false

  # --- Productivity ---
  affine:
    app:
      enabled: false
    db:
      enabled: false
  n8n:
    enabled: false
  vaultwarden:
    enabled: true

  # --- Media ---
  jellyfin:
    app:
      enabled: false
    hardwareDecoding: false   # consumed via dig in values template, not a condition
  seerr:
    enabled: false
  qbittorrent:
    enabled: false
  radarr:
    enabled: false
  sonarr:
    enabled: false
  prowlarr:
    enabled: false
  flaresolverr:
    enabled: false
